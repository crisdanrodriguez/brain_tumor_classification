name: Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.8, 3.9, "3.10", "3.11"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run tests
      run: |
        python test_basic.py

    - name: Run feature extraction (smoke test)
      run: |
        python -c "import features_extraction; print('Feature extraction import OK')"

    - name: Run stacking sklearn (smoke test)
      run: |
        python -c "import stacking_sklearn; print('Stacking sklearn import OK')"

    - name: Run stacking from scratch (smoke test)
      run: |
        python -c "import stacking_from_scratch; print('Stacking from scratch import OK')"